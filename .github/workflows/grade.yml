name: grade-fixture

on:
  workflow_dispatch:
    inputs:
      fixture_dir:
        description: "Path to fixture dir containing fixture.json + truth.json"
        required: true

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m src.pipeline.orchestrator grade --fixture-dir "${{ inputs.fixture_dir }}"
      - run: python -m src.leaderboard.build
      - uses: actions/upload-artifact@v4
        with:
          name: leaderboard
          path: docs/leaderboard/
