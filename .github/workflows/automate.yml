name: automate

# Cron-driven pipeline:
#   every 10 minutes, run `src.pipeline.scheduler tick` which scans
#   configs/fixtures.yaml and fires every pipeline phase whose window is
#   currently open for each fixture:
#
#     ingest       T-72h → T-1h   pull fixture.json from API-Football
#     populate     T-48h → T-1h   fill context_pack (squads, form, news, stats)
#     lock_predict T-1h  → T+0h   lock snapshot + run every model prediction
#     truth_grade  T+3h  → T+48h  fetch truth + grade + rebuild leaderboard
#
# Every phase is idempotent: `ingest` skips if fixture.json exists, `populate`
# skips if context_pack.squads is already set, `lock_predict` skips predict if
# the predictions directory is non-empty, `truth_grade` skips truth-download
# if truth.json exists. So the 10-minute cadence is safe — repeated ticks are
# cheap no-ops, and missed ticks catch up automatically.
#
# The scheduler commits any new/updated artifacts (fixture.json, truth.json,
# predictions, results, leaderboard payload) back to main so the pages
# deploy workflow picks them up.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes, UTC
  workflow_dispatch:
    inputs:
      phase:
        description: "Phase to run (blank = all due phases)"
        required: false
        type: choice
        default: ""
        options: ["", "ingest", "populate", "lock_predict", "truth_grade"]

permissions:
  contents: write   # for auto-commit of new artifacts
  actions: write    # for gh workflow run pages.yml

concurrency:
  group: automate
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt python-dotenv pyyaml

      - name: Scheduler status
        run: python -m src.pipeline.scheduler show

      - name: Scheduler tick
        env:
          PYTHONUNBUFFERED: "1"
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          TOGETHER_API_KEY:   ${{ secrets.TOGETHER_API_KEY }}
          DASHSCOPE_API_KEY:  ${{ secrets.DASHSCOPE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          MIROMIND_API_KEY:   ${{ secrets.MIROMIND_API_KEY }}
        run: |
          if [ -n "${{ inputs.phase }}" ]; then
            python -m src.pipeline.scheduler tick --phase "${{ inputs.phase }}"
          else
            python -m src.pipeline.scheduler tick
          fi

      - name: Build site payload
        run: python -m src.leaderboard.build_site || true

      - name: Commit updated artifacts
        run: |
          git config user.name  "worldcuparena-bot"
          git config user.email "bot@worldcuparena.local"
          echo "--- files written by pipeline ---"
          ls data/snapshots/ 2>/dev/null || echo "(data/snapshots missing)"
          git add data/snapshots data/predictions data/results docs/leaderboard docs/site/data.json
          echo "--- git status after add ---"
          git status --short
          if ! git diff --cached --quiet; then
            git commit -m "automate: tick $(date -u +%FT%TZ)"
            git pull --rebase origin main
            git push
            gh workflow run pages.yml --ref main
          else
            echo "no changes to commit"
          fi
