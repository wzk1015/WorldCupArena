# WorldCupArena — Setting matrix (simplified, 2026-04-18)
#
# Two settings:
#   S1   full context injected, no tools  -> closed / open LLMs
#   S2   tools on, self-directed search   -> search-LLMs + deep-research agents
#
# Rationale:
#   - S1 measures what an LLM can do when given the same evidence a human analyst
#     would assemble (squads + recent form + news headlines + stats). No tool use.
#   - S2 measures what a tool-using model/agent can do on its own: it's told what
#     kinds of evidence to gather (with short concrete examples) and is free to
#     search for more. No context is pre-injected.
#   - Earlier drafts also had "no info, no tools" and "no info, no prompt guidance"
#     settings; both were dropped because they answered questions we don't care
#     about (pure prior / unprompted retrieval).
#   - "Research uplift" is now defined as S2 (tool-using agent) minus S1 (best-case
#     context-fed LLM of the same provider, where comparable).

settings:
  S1:
    description: >-
      Full context pack injected (official squads + recent form + ~20 news
      headlines + recent stats). No tools.
    tools_allowed: false
    inject:
      fixture_header: true
      squads: true
      recent_form: true
      news_headlines: true
      stats: true
      search_guidance: false

  S2:
    description: >-
      Tools enabled. Prompt instructs the model/agent to self-search for squads,
      recent form, news, and stats (with short examples of each) and to pull any
      additional evidence it thinks useful. No context is pre-injected.
    tools_allowed: true
    inject:
      fixture_header: true
      squads: false
      recent_form: false
      news_headlines: false
      stats: false
      search_guidance: true

policy:
  prediction_lock_hours_before_kickoff: 1
  result_fetch_grace_hours: 24
  leakage_audit: true
  require_probabilities: true
  require_reasoning: true
  # Format validation: orchestrator will schema-check and retry up to N times.
  max_format_retries: 2
  probability_sum_tolerance: 0.01
