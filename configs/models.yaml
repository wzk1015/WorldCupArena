# WorldCupArena — model registry
#
# Default policy: ONE flagship LLM per provider (deep-research agents excluded from this rule).
# Models we removed but left reference pricing for (in comments) can be re-added by anyone
# sponsoring their cost.
#
# Categories:
#   closed_llm           : proprietary LLMs, no tool-use
#   open_llm             : open-weight LLMs (hosted provider for now; base_url swappable)
#   search_llm           : LLMs with built-in web_search tool enabled
#   deep_research_agent  : multi-step research agents
#
# Setting coverage (simplified 2026-04-18 to 2 settings):
#   closed_llm / open_llm -> [S1]   (no tools; full context pack injected)
#   search_llm            -> [S2]   (tools on; model self-searches with guidance)
#   deep_research_agent   -> [S2]   (tools on; agent self-searches with guidance)
#
# base_url / base_url_env:
#   `base_url` is the provider's official endpoint (used by default).
#   `base_url_env` names an env var that, if set and non-empty, OVERRIDES `base_url`
#   at runtime — use this to route through a 中转/proxy without touching this file.

closed_llm:
  - id: gemini-2.5-pro
    provider: google
    model: gemini-2.5-pro-preview-05-06
    api_key_env: GOOGLE_API_KEY
    base_url_env: GOOGLE_BASE_URL
    base_url: https://generativelanguage.googleapis.com/v1beta
    price_per_mtok: { input: 1.25, output: 10.00 }
    settings_supported: [S1]
  - id: claude-opus-4-6
    provider: anthropic
    model: claude-opus-4-6
    api_key_env: ANTHROPIC_API_KEY
    base_url_env: ANTHROPIC_BASE_URL
    base_url: https://api.anthropic.com
    price_per_mtok: { input: 15.00, output: 75.00 }
    settings_supported: [S1]
  - id: grok-3
    provider: xai
    model: grok-3
    api_key_env: XAI_API_KEY
    base_url_env: XAI_BASE_URL
    base_url: https://api.x.ai/v1
    price_per_mtok: { input: 3.00, output: 15.00 }
    settings_supported: [S1]
  - id: qwen-max
    provider: dashscope
    model: qwen-max
    api_key_env: DASHSCOPE_API_KEY
    base_url_env: DASHSCOPE_BASE_URL
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    price_per_mtok: { input: 1.60, output: 6.40 }
    settings_supported: [S1]
  - id: kimi-k2
    provider: moonshot
    model: kimi-k2-0711-preview
    api_key_env: MOONSHOT_API_KEY
    base_url_env: MOONSHOT_BASE_URL
    base_url: https://api.moonshot.cn/v1
    price_per_mtok: { input: 0.60, output: 2.50 }
    settings_supported: [S1]
  - id: glm-4-plus
    provider: zhipu
    model: glm-4-plus
    api_key_env: ZHIPU_API_KEY
    base_url_env: ZHIPU_BASE_URL
    base_url: https://open.bigmodel.cn/api/paas/v4
    price_per_mtok: { input: 0.70, output: 2.80 }
    settings_supported: [S1]
